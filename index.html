<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoBrainer Guru</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 420px;
  text-align: center;
}

h1 { font-size: 28px; }

.subtitle {
  opacity: 0.6;
  font-size: 13px;
  margin-bottom: 20px;
}

select, input, button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

button {
  background: linear-gradient(135deg, #22c55e, #4ade80);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 20px;
  border-radius: 14px;
  background: rgba(30,41,59,0.8);
  text-align: left;
}
</style>
</head>

<body>

<div class="container">
  <h1>NoBrainer</h1>
  <div class="subtitle" id="subtitle">Your decision guru</div>

  <select id="lang">
    <option value="en">English</option>
    <option value="nl">Nederlands</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
  </select>

  <input id="question" placeholder="What should I do?" />
  <button onclick="decide()">Decide</button>

  <div id="output" class="result" style="display:none;"></div>
</div>

<script>

function detectCategory(input) {
  const text = input.toLowerCase();

  if (text.match(/(verhuis|emigrate|move|country|land)/)) return "life";
  if (text.match(/(job|werk|career|baan)/)) return "career";
  if (text.match(/(liefde|relationship|dating|vriend|girlfriend|boyfriend)/)) return "relationship";
  if (text.match(/(eten|eat|food|dinner|lunch)/)) return "food";
  if (text.match(/(kijken|watch|film|movie|serie)/)) return "entertainment";

  return "general";
}

const responses = {

    ]
  },

      ["Investeer meer", "Goede dingen kosten moeite."]
    ]
  },

  food: {

      ["Keep it simple", "Less thinking, more doing."],
      ["Cook something fresh", "Better for body and mind."]
    ],
    nl: [

    ]
  },

  entertainment: {

      ["Watch something light", "Relax your brain."],
      ["Try something new", "Break the routine."],
      ["Skip it", "Rest without screens."]
    ],
    nl: [
      ["Kijk iets luchtigs", "Ontspan je hoofd."],
      ["Probeer iets nieuws", "Doorbreek routine."],
      ["Sla het over", "Rust zonder scherm."]
    ]
  },

  general: {
    en: [
      ["Start small", "Action beats thinking."],
      ["Do it now", "Momentum matters."],
      ["Pause and reset", "Clarity comes after calm."]
    ],
    nl: [
      ["Begin klein", "Actie wint van denken."],
      ["Doe het nu", "Momentum is alles."],
      ["Neem pauze", "Rust geeft helderheid."]
    ]
  }
};

  const output = document.getElementById("output");
