<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoBrainer Guru</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 420px;
  text-align: center;
}

h1 { font-size: 28px; }

.subtitle {
  opacity: 0.6;
  font-size: 13px;
  margin-bottom: 20px;
}

select, input, button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

button {
  background: linear-gradient(135deg, #22c55e, #4ade80);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 20px;
  border-radius: 14px;
  background: rgba(30,41,59,0.8);
  backdrop-filter: blur(10px);
  text-align: left;
}

.loader {
  margin-top: 15px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>NoBrainer</h1>
  <div class="subtitle" id="subtitle">Your decision guru</div>

  <select id="lang">
    <option value="en">English</option>
    <option value="nl">Nederlands</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
  </select>

  <input id="question" placeholder="What should I do?" />
  <button onclick="decide()">Decide</button>

  <div id="loading" class="loader" style="display:none;">Thinking...</div>
  <div id="output" class="result" style="display:none;"></div>
</div>

<script>
function decide() {
  const input = document.getElementById("question").value.toLowerCase();
  const lang = document.getElementById("lang").value;
  const output = document.getElementById("output");
  const loading = document.getElementById("loading");

  output.style.display = "none";
  loading.style.display = "block";

  setTimeout(() => {

    let decision = "";
    let why = "";

    // 🔍 Context detection
    if (input.includes("emigrate") || input.includes("verhuizen") || input.includes("move country")) {
      decision = {
        en: "Move, but test it first",
        nl: "Verhuis, maar test het eerst",
        es: "Muévete, pero pruébalo primero",
        fr: "Déménage, mais teste d'abord",
        de: "Zieh um, aber teste es zuerst"
      }[lang];

      why = {
        en: "Commitment without testing is risky. Try before going all in.",
        nl: "Zonder testen is het risico groot. Probeer eerst.",
        es: "Sin probar, es arriesgado. Inténtalo primero.",
        fr: "Sans tester, c'est risqué. Essaie d'abord.",
        de: "Ohne Test ist es riskant. Probier es zuerst."
      }[lang];

    } else if (input.includes("job") || input.includes("werk")) {
      decision = {
        en: "Choose growth over comfort",
        nl: "Kies groei boven comfort",
        es: "Elige crecimiento sobre comodidad",
        fr: "Choisis la croissance",
        de: "Wähle Wachstum"
      }[lang];

      why = {
        en: "Comfort keeps you stuck. Growth moves you forward.",
        nl: "Comfort houdt je vast. Groei brengt je verder.",
        es: "La comodidad te frena. Crecer te mueve.",
        fr: "Le confort te bloque. La croissance avance.",
        de: "Komfort hält dich fest. Wachstum bringt dich weiter."
      }[lang];

    } else {
      decision = {
        en: "Start small and act now",
        nl: "Begin klein en doe het nu",
        es: "Empieza pequeño y actúa",
        fr: "Commence petit et agis",
        de: "Fang klein an und handle"
      }[lang];

      why = {
        en: "Action removes doubt faster than thinking.",
        nl: "Actie verwijdert twijfel sneller dan nadenken.",
        es: "Actuar elimina dudas más rápido.",
        fr: "Agir enlève le doute.",
        de: "Handeln beseitigt Zweifel."
      }[lang];
    }

    loading.style.display = "none";
    output.style.display = "block";

    output.innerHTML = `
      <strong>${decision}</strong><br><br>
      ${why}
    `;

  }, 700);
}
</script>

</body>
</html>
